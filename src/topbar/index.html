<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src data:;" />
  <title>Mail</title>
  <style>
    :root { --bar: 40px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #181a1f;
      overflow: hidden;
      color: #e8e8ee;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
    }

    /* The whole bar is a window-drag handle; interactive bits opt out. */
    #bar {
      display: flex; align-items: center;
      width: 100%; height: var(--bar);
      border-bottom: 1px solid #2a2c33;
      -webkit-app-region: drag;
      padding-left: 10px;
    }
    button, input { -webkit-app-region: no-drag; }

    /* Brand: envelope mark + wordmark + active-account chip. */
    #brand { display: flex; align-items: center; gap: 8px; min-width: 0; }
    #logo {
      width: 20px; height: 20px; flex: none;
      display: flex; align-items: center; justify-content: center;
      color: #8b8fff;
    }
    #logo svg { width: 18px; height: 18px; display: block; }
    #title { font-size: 13px; font-weight: 600; letter-spacing: .2px; flex: none; }
    #acct {
      font-size: 12px; color: #9a9aa6; margin-left: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      min-width: 0;
    }
    #acct::before { content: "—"; margin-right: 6px; color: #50535c; }
    #acct:empty { display: none; }

    .spacer { flex: 1 1 auto; }

    /* Toolbar actions (reload, start-on-login). */
    #tools { display: flex; align-items: center; gap: 2px; padding-right: 6px; }
    .tb {
      width: 32px; height: 28px; border: none; background: transparent;
      color: #b8b8c0; cursor: pointer; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s ease, color .12s ease;
    }
    .tb:hover { background: #26282f; color: #fff; }
    .tb.active { color: #8b8fff; }
    .tb svg { width: 16px; height: 16px; display: block; }

    .sep { width: 1px; height: 18px; background: #2e3038; margin: 0 6px; }

    /* Window controls — normal horizontal min / max / close on the right. */
    #winctl { display: flex; align-items: center; height: 100%; }
    .wc {
      width: 46px; height: var(--bar); border: none; background: transparent;
      color: #c8c8d0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s ease, color .12s ease;
    }
    .wc:hover { background: #26282f; color: #fff; }
    .wc.close:hover { background: #c4314b; color: #fff; }
    .wc svg { width: 11px; height: 11px; display: block; }
  </style>
</head>
<body>
  <div id="bar">
    <div id="brand">
      <span id="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linejoin="round">
          <rect x="2.5" y="5" width="19" height="14" rx="2.5" />
          <path d="M3 7 L12 13 L21 7" />
        </svg>
      </span>
      <span id="title">Mail</span>
      <span id="acct"></span>
    </div>

    <div class="spacer"></div>

    <div id="tools">
      <button class="tb" id="reload" title="Reload current account"></button>
      <button class="tb" id="startup"></button>
    </div>
    <div class="sep"></div>

    <div id="winctl">
      <button class="wc" id="min" title="Minimize" aria-label="Minimize"></button>
      <button class="wc" id="max" title="Maximize" aria-label="Maximize"></button>
      <button class="wc close" id="close" title="Close" aria-label="Close"></button>
    </div>
  </div>

  <script src="topbar.js"></script>
</body>
</html>
