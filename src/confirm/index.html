<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';" />
  <title>Confirm</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1f1f23;
      color: #e8e8ee;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-user-select: none; user-select: none;
      overflow: hidden;
    }
    /* The whole frameless window is the card. */
    body {
      display: flex; flex-direction: column;
      padding: 22px 22px 18px;
      border: 1px solid #34343c; border-radius: 12px;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    p.msg { font-size: 13.5px; line-height: 1.45; color: #d7d7df; }
    p.detail { font-size: 12px; line-height: 1.4; color: #9a9aa6; margin-top: 8px; }
    .spacer { flex: 1; }
    .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    button {
      height: 36px; padding: 0 16px; border-radius: 8px; cursor: pointer;
      font-size: 13.5px; font-weight: 500; border: 1px solid transparent;
      transition: background .12s ease, border-color .12s ease;
    }
    button:focus-visible { outline: 2px solid #8b8fff; outline-offset: 2px; }
    .cancel { background: transparent; color: #c8c8d0; border-color: #3a3a44; }
    .cancel:hover { background: #2a2a30; }
    .ok { background: #0078D4; color: #fff; }
    .ok:hover { background: #1186e6; }
    /* Destructive variant. */
    .ok.danger { background: #c4314b; }
    .ok.danger:hover { background: #d83b57; }
  </style>
</head>
<body>
  <h1 id="title">Are you sure?</h1>
  <p class="msg" id="message"></p>
  <p class="detail" id="detail"></p>

  <div class="spacer"></div>
  <div class="actions">
    <button class="cancel" id="cancel">Cancel</button>
    <button class="ok" id="ok">OK</button>
  </div>

  <script src="confirm.js"></script>
</body>
</html>
