<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';" />
  <title>Add account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #1f1f23;
      color: #e8e8ee;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      -webkit-user-select: none; user-select: none;
    }
    body { display: flex; flex-direction: column; padding: 20px; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    p.sub { font-size: 12px; color: #9a9aa6; margin-bottom: 16px; }
    label { display: block; font-size: 11px; color: #9a9aa6; margin: 0 0 6px; text-transform: uppercase; letter-spacing: .4px; }
    .field { margin-bottom: 14px; }
    select, input[type=text] {
      width: 100%; height: 38px; padding: 0 10px;
      background: #2a2a30; color: #e8e8ee;
      border: 1px solid #3a3a44; border-radius: 8px;
      font-size: 14px; outline: none;
    }
    select:focus, input[type=text]:focus { border-color: #8b8fff; }
    input::placeholder { color: #6a6a76; }
    #customWrap { display: none; }
    #customWrap.show { display: block; }
    .spacer { flex: 1; }
    .actions { display: flex; justify-content: flex-end; gap: 10px; }
    button {
      height: 38px; padding: 0 18px; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 500; border: 1px solid transparent;
    }
    .cancel { background: transparent; color: #c8c8d0; border-color: #3a3a44; }
    .cancel:hover { background: #2a2a30; }
    .ok { background: #0078D4; color: #fff; }
    .ok:hover { background: #1186e6; }
    .ok:disabled { background: #3a3a44; color: #7a7a86; cursor: default; }
  </style>
</head>
<body>
  <h1>Add an account</h1>
  <p class="sub">Pick the service. Each account gets its own isolated login session.</p>

  <div class="field">
    <label for="service">Service</label>
    <select id="service"></select>
  </div>

  <div class="field" id="customWrap">
    <label for="url">Webmail URL</label>
    <input type="text" id="url" placeholder="https://mail.example.com/" autocomplete="off" />
  </div>

  <div class="field">
    <label for="acctLabel">Label (optional)</label>
    <input type="text" id="acctLabel" placeholder="e.g. Work, Personal" autocomplete="off" />
  </div>

  <div class="spacer"></div>
  <div class="actions">
    <button class="cancel" id="cancel">Cancel</button>
    <button class="ok" id="ok">Add account</button>
  </div>

  <script src="dialog.js"></script>
</body>
</html>
